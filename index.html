<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placar do Bolão: Thiago x Jamilly x Samyr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bibliotecas do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Cabeçalho -->
        <header class="bg-white rounded-xl shadow-md p-6 mb-8 text-center border-t-4 border-blue-600 relative">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">🏆 Bolão da Galera</h1>
            <p class="text-gray-600 text-sm mb-4">
                <strong>Regras:</strong> Goleada = 3+ gols | Apertado = 1 ou 2 gols | Pênalti = Decisão nos pênaltis
            </p>
            
            <!-- Indicador de Conexão -->
            <div id="status-conexao" class="inline-block bg-gray-200 text-gray-800 text-xs px-3 py-1 rounded-full font-bold">
                ⏳ Conectando ao banco de dados...
            </div>
        </header>

        <!-- Placar -->
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-white rounded-xl shadow p-6 text-center border-b-4 border-green-500 transition-transform transform hover:scale-105">
                <h2 class="text-xl font-bold text-gray-700">Thiago</h2>
                <p id="score-Thiago" class="text-4xl font-black text-green-600 mt-2">0</p>
                <p class="text-sm text-gray-500 mt-1">pontos</p>
            </div>
            <div class="bg-white rounded-xl shadow p-6 text-center border-b-4 border-purple-500 transition-transform transform hover:scale-105">
                <h2 class="text-xl font-bold text-gray-700">Jamilly</h2>
                <p id="score-Jamilly" class="text-4xl font-black text-purple-600 mt-2">0</p>
                <p class="text-sm text-gray-500 mt-1">pontos</p>
            </div>
            <div class="bg-white rounded-xl shadow p-6 text-center border-b-4 border-orange-500 transition-transform transform hover:scale-105">
                <h2 class="text-xl font-bold text-gray-700">Samyr</h2>
                <p id="score-Samyr" class="text-4xl font-black text-orange-600 mt-2">0</p>
                <p class="text-sm text-gray-500 mt-1">pontos</p>
            </div>
        </div>

        <!-- Lista de Jogos -->
        <div class="bg-white rounded-xl shadow-md p-6">
            <h3 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">Jogos e Palpites</h3>
            <div id="games-container" class="space-y-6">
                <!-- Jogos injetados aqui -->
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔴 COLE AS CHAVES DO FIREBASE ABAIXO 🔴
        // ==========================================
       const firebaseConfig = {
            apiKey: "AIzaSyDekEGMMM6Cvtw1qU4Won7dw0vGiOz9l8U",
            authDomain: "bolao-copa-f2d00.firebaseapp.com",
            projectId: "bolao-copa-f2d00",
            storageBucket: "bolao-copa-f2d00.firebasestorage.app",
            messagingSenderId: "238370787479",
            appId: "1:238370787479:web:6eb5bfa4f6ac5b9a6419d2",
            measurementId: "G-6H6TD99HLN",
            databaseURL: "https://bolao-copa-f2d00-default-rtdb.firebaseio.com"
        };
        // ==========================================

        // Evita erro se a pessoa esquecer de colocar as chaves
        if (firebaseConfig.apiKey === "COLE_AQUI") {
            alert("⚠️ ALERTA: Você esqueceu de colocar as chaves do Firebase no código! O placar não vai salvar.");
        }

        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Monitora se o site conseguiu conectar com a nuvem do Google
        const statusBadge = document.getElementById('status-conexao');
        db.ref('.info/connected').on('value', function(snap) {
            if (snap.val() === true) {
                statusBadge.className = "inline-block bg-green-100 text-green-800 text-xs px-3 py-1 rounded-full font-bold";
                statusBadge.innerHTML = "🟢 Sincronizado ao Vivo";
            } else {
                statusBadge.className = "inline-block bg-red-100 text-red-800 text-xs px-3 py-1 rounded-full font-bold";
                statusBadge.innerHTML = "🔴 Desconectado (Não vai salvar)";
            }
        });

        const games = [
            { id: 1, teams: ["Canadá"], guesses: { Thiago: "Canadá apertado", Jamilly: "Canadá apertado", Samyr: "Canadá apertado" }, result: "Canadá apertado" },
            { id: 2, teams: ["Brasil"], guesses: { Thiago: "Brasil pênalti", Jamilly: "Brasil apertado", Samyr: "Brasil goleada" }, result: "Brasil apertado" },
            { id: 3, teams: ["Alemanha", "Paraguai"], guesses: { Thiago: "Alemanha goleada", Jamilly: "Paraguai pênalti", Samyr: "Alemanha apertado" }, result: "Paraguai pênalti" },
            { id: 4, teams: ["Marrocos", "Holanda"], guesses: { Thiago: "Marrocos pênalti", Jamilly: "Marrocos apertado", Samyr: "Holanda pênalti" }, result: "Marrocos pênalti" },
            { id: 5, teams: ["Noruega"], guesses: { Thiago: "Noruega apertado", Jamilly: "Noruega goleada", Samyr: "Noruega apertado" }, result: "" },
            { id: 6, teams: ["França"], guesses: { Thiago: "França goleada", Jamilly: "França goleada", Samyr: "França goleada" }, result: "" },
            { id: 7, teams: ["Equador", "México"], guesses: { Thiago: "Equador apertado", Jamilly: "Equador pênalti", Samyr: "México pênalti" }, result: "" },
            { id: 8, teams: ["Inglaterra"], guesses: { Thiago: "Inglaterra apertado", Jamilly: "Inglaterra apertado", Samyr: "Inglaterra apertado" }, result: "" },
            { id: 9, teams: ["Senegal"], guesses: { Thiago: "Senegal apertado", Jamilly: "Senegal apertado", Samyr: "Senegal pênalti" }, result: "" },
            { id: 10, teams: ["Bósnia", "EUA"], guesses: { Thiago: "Bósnia pênalti", Jamilly: "EUA apertado", Samyr: "EUA goleada" }, result: "" },
            { id: 11, teams: ["Espanha"], guesses: { Thiago: "Espanha goleada", Jamilly: "Espanha pênalti", Samyr: "Espanha goleada" }, result: "" },
            { id: 12, teams: ["Portugal", "Croácia"], guesses: { Thiago: "Portugal pênalti", Jamilly: "Croácia apertado", Samyr: "Portugal apertado" }, result: "" },
            { id: 13, teams: ["Suíça", "Argélia"], guesses: { Thiago: "Suíça apertado", Jamilly: "Argélia apertado", Samyr: "Suíça goleada" }, result: "" },
            { id: 14, teams: ["Egito"], guesses: { Thiago: "Egito apertado", Jamilly: "Egito goleada", Samyr: "Egito apertado" }, result: "" },
            { id: 15, teams: ["Argentina", "Cabo Verde"], guesses: { Thiago: "Cabo Verde pênalti", Jamilly: "Argentina goleada", Samyr: "Argentina goleada" }, result: "" },
            { id: 16, teams: ["Colômbia"], guesses: { Thiago: "Colômbia pênalti", Jamilly: "Colômbia goleada", Samyr: "Colômbia apertado" }, result: "" }
        ];

        const container = document.getElementById('games-container');
        const scoreT = document.getElementById('score-Thiago');
        const scoreJ = document.getElementById('score-Jamilly');
        const scoreS = document.getElementById('score-Samyr');

        function generateOptions(teams, selectedResult) {
            let optionsHTML = `<option value="">⚽ Selecione o Resultado...</option>`;
            teams.forEach(team => {
                ["apertado", "goleada", "pênalti"].forEach(type => {
                    const val = `${team} ${type}`;
                    optionsHTML += `<option value="${val}">${val}</option>`;
                });
            });
            optionsHTML += `<option value="Outro">Outro Resultado</option>`;
            return optionsHTML;
        }

        // 1. Desenha a tela inicial VAZIA ou com os dados padrão do código
        function renderGames() {
            container.innerHTML = "";
            games.forEach((game, index) => {
                const gameDiv = document.createElement('div');
                gameDiv.className = "p-4 border rounded-lg bg-gray-50 flex flex-col md:flex-row gap-4 items-center justify-between";
                
                gameDiv.innerHTML = `
                    <div class="w-full md:w-1/3">
                        <span class="text-sm font-bold text-blue-600 uppercase">Jogo ${game.id}</span>
                        <select id="result-${index}" class="mt-1 block w-full p-2 border border-gray-300 bg-white rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                            ${generateOptions(game.teams, game.result)}
                        </select>
                    </div>
                    
                    <div class="w-full md:w-2/3 grid grid-cols-3 gap-2 text-center text-sm">
                        <div id="guess-Thiago-${index}" class="p-2 border rounded-md transition-colors bg-gray-50 border-gray-200">
                            <span class="block text-xs font-semibold text-gray-500">Thiago</span>${game.guesses.Thiago}
                        </div>
                        <div id="guess-Jamilly-${index}" class="p-2 border rounded-md transition-colors bg-gray-50 border-gray-200">
                            <span class="block text-xs font-semibold text-gray-500">Jamilly</span>${game.guesses.Jamilly}
                        </div>
                        <div id="guess-Samyr-${index}" class="p-2 border rounded-md transition-colors bg-gray-50 border-gray-200">
                            <span class="block text-xs font-semibold text-gray-500">Samyr</span>${game.guesses.Samyr}
                        </div>
                    </div>
                `;
                container.appendChild(gameDiv);

                // Quando alguém mudar o select, salva no Firebase IMEDIATAMENTE
                document.getElementById(`result-${index}`).addEventListener('change', (e) => {
                    games[index].result = e.target.value;
                    const resultadosArray = games.map(g => g.result);
                    db.ref('resultados').set(resultadosArray);
                });
            });
            updateScores();
        }

        // 2. Calcula os pontos e colore as caixinhas de verde
        function updateScores() {
            let points = { Thiago: 0, Jamilly: 0, Samyr: 0 };

            games.forEach((game, index) => {
                const selectElement = document.getElementById(`result-${index}`);
                if (selectElement && selectElement.value !== game.result) {
                    selectElement.value = game.result;
                }

                ['Thiago', 'Jamilly', 'Samyr'].forEach(person => {
                    const guessElement = document.getElementById(`guess-${person}-${index}`);
                    if (!guessElement) return;

                    if (game.result !== "" && game.result !== "Outro" && game.result === game.guesses[person]) {
                        points[person]++;
                        guessElement.className = "p-2 border rounded-md transition-colors bg-green-100 border-green-400 text-green-800";
                    } else {
                        guessElement.className = "p-2 border rounded-md transition-colors bg-gray-50 border-gray-200";
                    }
                });
            });

            scoreT.innerText = points.Thiago;
            scoreJ.innerText = points.Jamilly;
            scoreS.innerText = points.Samyr;
        }

        // Executa a criação da tela
        renderGames();

        // 3. A MÁGICA DO FIREBASE: Puxa os dados da nuvem e atualiza a tela
        db.ref('resultados').on('value', (snapshot) => {
            const dados = snapshot.val();
            
            if (dados) {
                // Se já tem dados na nuvem, aplica eles nos jogos
                games.forEach((game, index) => {
                    game.result = dados[index] || "";
                });
                updateScores(); // Recalcula os placares sem recriar a tela toda
            } else {
                // Se o banco estiver vazio (primeira vez de todas), envia os primeiros 4 jogos já validados
                const resultadosArray = games.map(g => g.result);
                db.ref('resultados').set(resultadosArray);
            }
        });
    </script>
</body>
</html>
