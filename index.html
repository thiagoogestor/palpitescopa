    <script>

        const statusBadge = document.getElementById('status-conexao');
        db.ref('.info/connected').on('value', function(snap) {

                statusBadge.innerHTML = "рџ”ґ Sem ConexГЈo";
            }
        });

        // Adicionada a propriedade "datetime" com a data/hora real de cada jogo (padrГЈo Internacional)
        const games = [
            { id: 1, teams: ["CanadГЎ", "ГЃfrica do Sul"], title: "CanadГЎ рџ‡Ёрџ‡¦ x рџ‡їрџ‡¦ ГЃfrica do Sul", details: "Dom, 28/06 - 16h00", datetime: "2026-06-28T16:00:00", guesses: { Thiago: "CanadГЎ apertado", Jamilly: "CanadГЎ apertado", Samyr: "CanadГЎ apertado" }, result: "CanadГЎ apertado" },
            { id: 2, teams: ["Brasil", "JapГЈo"], title: "Brasil рџ‡§рџ‡· x рџ‡Їрџ‡µ JapГЈo", details: "Seg, 29/06 - 14h00", datetime: "2026-06-29T14:00:00", guesses: { Thiago: "Brasil pГЄnalti", Jamilly: "Brasil apertado", Samyr: "Brasil goleada" }, result: "Brasil apertado" },
            { id: 3, teams: ["Alemanha", "Paraguai"], title: "Alemanha рџ‡©рџ‡Є x рџ‡µрџ‡ѕ Paraguai", details: "Seg, 29/06 - 17h30", datetime: "2026-06-29T17:30:00", guesses: { Thiago: "Alemanha goleada", Jamilly: "Paraguai pГЄnalti", Samyr: "Alemanha apertado" }, result: "Paraguai pГЄnalti" },
            { id: 4, teams: ["Holanda", "Marrocos"], title: "Holanda рџ‡ірџ‡± x рџ‡Ірџ‡¦ Marrocos", details: "Seg, 29/06 - 22h00", datetime: "2026-06-29T22:00:00", guesses: { Thiago: "Marrocos pГЄnalti", Jamilly: "Marrocos apertado", Samyr: "Holanda pГЄnalti" }, result: "Marrocos pГЄnalti" },
            { id: 5, teams: ["Costa do Marfim", "Noruega"], title: "Costa do Marfim рџ‡Ёрџ‡® x рџ‡ірџ‡ґ Noruega", details: "Ter, 30/06 - 14h00", datetime: "2026-06-30T14:00:00", guesses: { Thiago: "Noruega apertado", Jamilly: "Noruega goleada", Samyr: "Noruega apertado" }, result: "" },
            { id: 6, teams: ["FranГ§a", "SuГ©cia"], title: "FranГ§a рџ‡«рџ‡· x рџ‡ёрџ‡Є SuГ©cia", details: "Ter, 30/06 - 18h00", datetime: "2026-06-30T18:00:00", guesses: { Thiago: "FranГ§a goleada", Jamilly: "FranГ§a goleada", Samyr: "FranГ§a goleada" }, result: "" },
            { id: 7, teams: ["MГ©xico", "Equador"], title: "MГ©xico рџ‡Ірџ‡Ѕ x рџ‡Єрџ‡Ё Equador", details: "Ter, 30/06 - 23h00", datetime: "2026-06-30T23:00:00", guesses: { Thiago: "Equador apertado", Jamilly: "Equador pГЄnalti", Samyr: "MГ©xico pГЄnalti" }, result: "" },
            { id: 8, teams: ["Inglaterra", "RD Congo"], title: "Inglaterra рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї x рџ‡Ёрџ‡© RD Congo", details: "Qua, 01/07 - 13h00", datetime: "2026-07-01T13:00:00", guesses: { Thiago: "Inglaterra apertado", Jamilly: "Inglaterra apertado", Samyr: "Inglaterra apertado" }, result: "" },
            { id: 9, teams: ["BГ©lgica", "Senegal"], title: "BГ©lgica рџ‡§рџ‡Є x рџ‡ёрџ‡і Senegal", details: "Qua, 01/07 - 17h00", datetime: "2026-07-01T17:00:00", guesses: { Thiago: "Senegal apertado", Jamilly: "Senegal apertado", Samyr: "Senegal pГЄnalti" }, result: "" },
            { id: 10, teams: ["EUA", "BГіsnia"], title: "EUA рџ‡єрџ‡ё x рџ‡§рџ‡¦ BГіsnia", details: "Qua, 01/07 - 21h00", datetime: "2026-07-01T21:00:00", guesses: { Thiago: "BГіsnia pГЄnalti", Jamilly: "EUA apertado", Samyr: "EUA goleada" }, result: "" },
            { id: 11, teams: ["Espanha", "ГЃustria"], title: "Espanha рџ‡Єрџ‡ё x рџ‡¦рџ‡№ ГЃustria", details: "Qui, 02/07 - 16h00", datetime: "2026-07-02T16:00:00", guesses: { Thiago: "Espanha goleada", Jamilly: "Espanha pГЄnalti", Samyr: "Espanha goleada" }, result: "" },
            { id: 12, teams: ["Portugal", "CroГЎcia"], title: "Portugal рџ‡µрџ‡№ x рџ‡­рџ‡· CroГЎcia", details: "Qui, 02/07 - 20h00", datetime: "2026-07-02T20:00:00", guesses: { Thiago: "Portugal pГЄnalti", Jamilly: "CroГЎcia apertado", Samyr: "Portugal apertado" }, result: "" },
            { id: 13, teams: ["SuГ­Г§a", "ArgГ©lia"], title: "SuГ­Г§a рџ‡Ёрџ‡­ x рџ‡©рџ‡ї ArgГ©lia", details: "Sex, 03/07 - 00h00", datetime: "2026-07-03T00:00:00", guesses: { Thiago: "SuГ­Г§a apertado", Jamilly: "ArgГ©lia apertado", Samyr: "SuГ­Г§a goleada" }, result: "" },
            { id: 14, teams: ["AustrГЎlia", "Egito"], title: "AustrГЎlia рџ‡¦рџ‡є x рџ‡Єрџ‡¬ Egito", details: "Sex, 03/07 - 15h00", datetime: "2026-07-03T15:00:00", guesses: { Thiago: "Egito apertado", Jamilly: "Egito goleada", Samyr: "Egito apertado" }, result: "" },
            { id: 15, teams: ["Argentina", "Cabo Verde"], title: "Argentina рџ‡¦рџ‡· x рџ‡Ёрџ‡» Cabo Verde", details: "Sex, 03/07 - 19h00", datetime: "2026-07-03T19:00:00", guesses: { Thiago: "Cabo Verde pГЄnalti", Jamilly: "Argentina goleada", Samyr: "Argentina goleada" }, result: "" },
            { id: 16, teams: ["ColГґmbia", "Gana"], title: "ColГґmbia рџ‡Ёрџ‡ґ x рџ‡¬рџ‡­ Gana", details: "Sex, 03/07 - 22h30", datetime: "2026-07-03T22:30:00", guesses: { Thiago: "ColГґmbia pГЄnalti", Jamilly: "ColГґmbia goleada", Samyr: "ColГґmbia apertado" }, result: "" }
        ];

        const container = document.getElementById('games-container');
        const scoreT = document.getElementById('score-Thiago');
        const scoreJ = document.getElementById('score-Jamilly');
        const scoreS = document.getElementById('score-Samyr');

        function generateOptions(teams, selectedResult) {
            let optionsHTML = `<option value="">вљЅ Aguardando Fim de Jogo...</option>`;
            teams.forEach(team => {
                ["apertado", "goleada", "pГЄnalti"].forEach(type => {
                    const val = `${team} ${type}`;
                    optionsHTML += `<option value="${val}">${val}</option>`;
                });
            });
            optionsHTML += `<option value="Outro">Outro Resultado</option>`;
            return optionsHTML;
        }

        function renderGames() {
            container.innerHTML = "";
            games.forEach((game, index) => {
                const gameDiv = document.createElement('div');
                gameDiv.id = `card-${index}`;
                gameDiv.className = "p-4 md:p-5 border-l-4 rounded-lg flex flex-col md:flex-row gap-4 items-center justify-between transition-all duration-300";
                
                gameDiv.innerHTML = `
                    <div class="w-full md:w-5/12 mb-2 md:mb-0">
                        <span class="block text-lg font-black text-gray-800 mb-1">${game.title}</span>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="block text-xs font-semibold text-gray-500 uppercase">рџ“… ${game.details}</span>
                            <span id="badge-${index}"></span>
                        </div>
                        <select id="result-${index}" class="block w-full p-2.5 border border-gray-300 bg-white rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 shadow-sm font-semibold text-gray-700 cursor-pointer">
                            ${generateOptions(game.teams, game.result)}
                        </select>
                    </div>
                    
                    <div class="w-full md:w-7/12 grid grid-cols-3 gap-2 text-center text-sm">
                        <div id="guess-Thiago-${index}">
                            <span class="block text-xs font-bold text-gray-500 mb-1">Thiago</span>
                            <span class="leading-tight">${game.guesses.Thiago}</span>
                        </div>
                        <div id="guess-Jamilly-${index}">
                            <span class="block text-xs font-bold text-gray-500 mb-1">Jamilly</span>
                            <span class="leading-tight">${game.guesses.Jamilly}</span>
                        </div>
                        <div id="guess-Samyr-${index}">
                            <span class="block text-xs font-bold text-gray-500 mb-1">Samyr</span>
                            <span class="leading-tight">${game.guesses.Samyr}</span>
                        </div>
                    </div>
                `;
                container.appendChild(gameDiv);

                document.getElementById(`result-${index}`).addEventListener('change', (e) => {
                    games[index].result = e.target.value;
                    const resultadosArray = games.map(g => g.result);
                    db.ref('resultados').set(resultadosArray);
                });
            });
            updateScores();
        }

        function updateScores() {
            let points = { Thiago: 0, Jamilly: 0, Samyr: 0 };
            const agora = new Date();

            games.forEach((game, index) => {
                const selectElement = document.getElementById(`result-${index}`);
                const card = document.getElementById(`card-${index}`);
                const badge = document.getElementById(`badge-${index}`);
                const horaDoJogo = new Date(game.datetime);
                
                if (selectElement && selectElement.value !== game.result) {
                    selectElement.value = game.result;
                }

                // --- Controle Visual de Status do Jogo (Aguardando / Em Breve / Encerrado) ---
                if (game.result !== "") {
                    // Tem resultado = Jogo Encerrado (Fica cinza para destacar os debaixo)
                    badge.innerHTML = "вњ… ENCERRADO";
                    badge.className = "bg-gray-200 text-gray-600 px-2 py-0.5 rounded text-[10px] uppercase font-bold";
                    card.className = "p-4 md:p-5 border-l-4 border-gray-400 bg-gray-200 rounded-lg flex flex-col md:flex-row gap-4 items-center justify-between transition-all duration-300 opacity-75";
                } else if (agora > horaDoJogo) {
                    // JГЎ passou da hora, mas nГЈo preencheram
                    badge.innerHTML = "вљ пёЏ AGUARDANDO PLACAR";
                    badge.className = "bg-red-100 text-red-600 px-2 py-0.5 rounded text-[10px] uppercase font-bold";
                    card.className = "p-4 md:p-5 border-l-4 border-red-400 bg-white shadow-md rounded-lg flex flex-col md:flex-row gap-4 items-center justify-between transition-all duration-300";
                } else {
                    // Jogo no futuro
                    badge.innerHTML = "вЏі EM BREVE";
                    badge.className = "bg-blue-100 text-blue-600 px-2 py-0.5 rounded text-[10px] uppercase font-bold";
                    card.className = "p-4 md:p-5 border-l-4 border-blue-400 bg-white shadow-md rounded-lg flex flex-col md:flex-row gap-4 items-center justify-between transition-all duration-300";
                }

                // --- Controle de Cores dos Palpites (Verde = Acerto | Vermelho = Erro | Cinza = Neutro) ---
                ['Thiago', 'Jamilly', 'Samyr'].forEach(person => {
                    const guessElement = document.getElementById(`guess-${person}-${index}`);
                    if (!guessElement) return;

                    if (game.result === "") {
                        // Jogo nГЈo aconteceu (Neutro)
                        guessElement.className = "p-2 border rounded-md bg-gray-100 border-gray-200 text-gray-500 flex flex-col justify-center";
                    } else if (game.result !== "Outro" && game.result === game.guesses[person]) {
                        // Acertou na mosca (Verde)
                        points[person]++;
                        guessElement.className = "p-2 border rounded-md transition-colors bg-green-100 border-green-500 text-green-900 font-bold shadow-sm flex flex-col justify-center transform scale-105";
                    } else {
                        // Errou (Vermelho)
                        guessElement.className = "p-2 border rounded-md transition-colors bg-red-50 border-red-300 text-red-600 opacity-70 flex flex-col justify-center";
                    }
                });
            });

            scoreT.innerText = points.Thiago;
            scoreJ.innerText = points.Jamilly;
            scoreS.innerText = points.Samyr;
        }

        renderGames();

        db.ref('resultados').on('value', (snapshot) => {
            const dados = snapshot.val();
            if (dados) {
                games.forEach((game, index) => {
                    game.result = dados[index] || "";
                });
                updateScores();
            } else {
                const resultadosArray = games.map(g => g.result);
                db.ref('resultados').set(resultadosArray);
            }
        });

        // Um truque para garantir que os crachГЎs de "Em breve" atualizem sozinhos se a hora virar com o site aberto
        setInterval(updateScores, 60000); // Roda a checagem a cada 1 minuto
    </script>
</body>
